<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420">
  <link rel="stylesheet" href="popup.css">
  <title>FIFA Ticket Scout</title>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <img class="brand-logo" src="icons/icon128.png" alt="FIFA Ticket Scout">
        <h1>FIFA Ticket Scout</h1>
      </div>
      <div class="header-actions">
        <a href="https://buymeacoffee.com/davidrd" target="_blank" class="header-coffee" title="Buy me a coffee">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M8 2.748l-.717-.737C5.6.281 2.514.878 1.4 3.053c-1.128 2.208.236 4.756 2.088 6.266L8 13.252l4.513-3.933C14.364 7.81 15.728 5.261 14.6 3.053 13.486.878 10.4.28 8.717 2.01L8 2.748z"/></svg>
        </a>
        <button class="refresh-btn" id="refreshBtn" title="Refresh data">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 4v4h4"/><path d="M15 12V8h-4"/>
            <path d="M2.5 10.5a6 6 0 0110.2-3.3L15 8M1 8l2.3.8a6 6 0 0010.2 3.3"/>
          </svg>
        </button>
        <span class="badge" id="liveBadge" style="display:none;">
          <span class="live-dot"></span> LIVE
        </span>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div id="noData" class="empty-state">
    <div class="empty-icon">
      <img src="icons/icon128.png" width="72" height="72" alt="">
    </div>
    <p class="empty-title" id="emptyTitle">FIFA Ticket Scout</p>
    <p class="empty-hint" id="emptyHint">Open the FIFA resale ticket site and browse a seat map to start capturing prices.</p>
    <a class="btn btn-small" id="emptyAction" href="#" style="display:none;"></a>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none;">

    <!-- Match Info -->
    <div class="match-info" id="matchInfo"></div>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Category Tabs + Content -->
    <div class="section cat-tabs-section">
      <div class="cat-tabs" id="catTabs"></div>
      <div id="catContent"></div>
    </div>

    <!-- Block Breakdown -->
    <div class="section">
      <div class="section-header collapsible" id="blockToggle">
        <h2>Block Breakdown</h2>
        <svg class="chevron" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </div>
      <div class="table-wrap collapsible-body" id="blockBody" style="display:none;">
        <table class="data-table" id="blockTable">
          <thead>
            <tr>
              <th>Block</th>
              <th>Area</th>
              <th class="num">Seats</th>
              <th class="num">Min</th>
              <th class="num">Max</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Scan -->
    <div class="scan-section" id="scanSection">
      <button id="scanBtn" class="btn btn-scan">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6"/>
          <path d="M8 2v6l4 2"/>
        </svg>
        <span id="scanBtnText">Clear & Rescan</span>
      </button>
      <div class="scan-progress" id="scanProgress" style="display:none;">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText">0%</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="exportBtn" class="btn btn-primary">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2v8m0 0l-3-3m3 3l3-3"/>
          <path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/>
        </svg>
        Export CSV
      </button>
      <button id="clearBtn" class="btn btn-danger">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4h12M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1m2 0v9a1 1 0 01-1 1H4a1 1 0 01-1-1V4h10z"/>
        </svg>
        Clear Data
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://buymeacoffee.com/davidrd" target="_blank" class="footer-link kofi">
      <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor"><path d="M8 2.748l-.717-.737C5.6.281 2.514.878 1.4 3.053c-1.128 2.208.236 4.756 2.088 6.266L8 13.252l4.513-3.933C14.364 7.81 15.728 5.261 14.6 3.053 13.486.878 10.4.28 8.717 2.01L8 2.748z"/></svg>
      Buy Me a Coffee
    </a>
    <span class="footer-sep"></span>
    <a href="https://github.com/david-dirring/fifa-ticket-scout" target="_blank" class="footer-link github">
      <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
